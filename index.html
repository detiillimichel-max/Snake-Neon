<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Snake Neon</title>
<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    margin: 0;
    background: radial-gradient(1200px 800px at 50% -10%, #0a0f1e 0%, #05060a 55%, #020305 100%);
    color: #e6faff;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    overscroll-behavior: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
 .wrap {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
 .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,255,255,0.15);
    box-shadow: 0 0 20px rgba(0,255,255,0.08) inset;
  }
 .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
 .stat.label {
    font-size: 11px;
    letter-spacing:.12em;
    text-transform: uppercase;
    color: rgba(180,240,255,.7);
  }
 .stat.value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    color: #aaffff;
    text-shadow: 0 0 10px rgba(0,255,255,.8);
  }
 .board {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    padding: 10px;
    background: linear-gradient(180deg, rgba(0,255,255,.08), rgba(255,0,255,.05));
    box-shadow:
      0 0 0 2px rgba(0,255,255,.35),
      0 0 30px rgba(0,255,255,.25),
      0 0 80px rgba(255,0,255,.15) inset;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    background: #02040a;
    touch-action: none;
  }
 .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
 .btn {
    user-select: none;
    -webkit-user-select: none;
    appearance: none;
    border: none;
    border-radius: 16px;
    padding: 18px 0;
    font-size: 18px;
    font-weight: 800;
    letter-spacing:.08em;
    text-transform: uppercase;
    color: #001214;
    background: linear-gradient(180deg, #00ffff, #00d6d6);
    box-shadow:
      0 0 0 2px rgba(0,255,255,.6),
      0 0 25px rgba(0,255,255,.7),
      0 8px 20px rgba(0,0,0,.5);
    transition: transform.06s ease, filter.15s ease;
  }
 .btn:active {
    transform: translateY(2px) scale(.98);
    filter: brightness(.95);
  }
 .btn span {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
 .overlay {
    position: absolute;
    inset: 10px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(600px 400px at 50% 0%, rgba(0,0,0,.4), rgba(0,0,0,.85));
    backdrop-filter: blur(6px);
    z-index: 10;
  }
 .card {
    text-align: center;
    padding: 28px 24px;
    border-radius: 20px;
    background: rgba(5,10,20,.85);
    border: 1px solid rgba(0,255,255,.3);
    box-shadow: 0 0 40px rgba(0,255,255,.2), inset 0 0 30px rgba(255,0,255,.08);
    max-width: 90%;
  }
 .title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing:.02em;
    margin: 0 0 8px;
    color: #fff;
    text-shadow:
      0 0 12px rgba(0,255,255,.9),
      0 0 30px rgba(0,255,255,.6);
  }
 .subtitle {
    margin: 0 0 20px;
    color: rgba(200,240,255,.8);
    font-size: 14px;
  }
 .play {
    cursor: pointer;
    border: none;
    border-radius: 14px;
    padding: 16px 28px;
    font-size: 20px;
    font-weight: 900;
    letter-spacing:.1em;
    text-transform: uppercase;
    color: #001014;
    background: linear-gradient(180deg, #ff00ff, #d600d6);
    box-shadow:
      0 0 0 2px rgba(255,0,255,.6),
      0 0 30px rgba(255,0,255,.7),
      0 10px 30px rgba(0,0,0,.6);
    transition: transform.08s ease;
  }
 .play:active { transform: scale(.97); }
 .hint {
    margin-top: 14px;
    font-size: 12px;
    color: rgba(150,200,220,.7);
  }
 .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(0,136,255,.15);
    border: 1px solid rgba(0,136,255,.5);
    color: #8fd4ff;
    font-size: 11px;
    letter-spacing:.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    box-shadow: 0 0 15px rgba(0,136,255,.4);
  }
 .power {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(0,136,255,.15);
    border: 1px solid rgba(0,136,255,.6);
    color: #aaddff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing:.08em;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,136,255,.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity.2s ease;
    z-index: 5;
  }
 .power.show { opacity: 1; }
 .hide { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="stat">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="stat" style="text-align:right">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>

  <div class="board">
    <div class="power" id="powerBadge">SLOW • 5.0s</div>
    <canvas id="game"></canvas>

    <div class="overlay" id="startOverlay">
      <div class="card">
        <div class="badge">Neon Edition</div>
        <h1 class="title">SNAKE</h1>
        <p class="subtitle">Swipe to steer • LEFT / RIGHT to turn<br>Food = magenta • Power = blue slow-mo</p>
        <button class="play" id="playBtn">PLAY</button>
        <div class="hint">No reverse • Walls are lethal</div>
      </div>
    </div>

    <div class="overlay hide" id="gameOverOverlay">
      <div class="card">
        <div class="badge">Game Over</div>
        <h1 class="title" id="finalScore">0</h1>
        <p class="subtitle">Best: <span id="finalBest">0</span></p>
        <button class="play" id="restartBtn">RESTART</button>
        <div class="hint">Swipe or use buttons to play again</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="leftBtn"><span>⟲ LEFT</span></button>
    <button class="btn" id="rightBtn"><span>RIGHT ⟳</span></button>
  </div>
</div>

<script>
(function(){
  'use strict';

  const GRID = 24;
  const CELL_BORDER = 1;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const playBtn = document.getElementById('playBtn');
  const restartBtn = document.getElementById('restartBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const finalBestEl = document.getElementById('finalBest');
  const leftBtn = document.getElementById('leftBtn');
  const rightBtn = document.getElementById('rightBtn');
  const powerBadge = document.getElementById('powerBadge');

  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let size = 0;
  let cell = 0;
  let lastTime = 0;
  let acc = 0;

  const state = {
    running: false,
    over: false,
    dir: {x:1, y:0},
    nextDir: {x:1, y:0},
    snake: [],
    food: null,
    power: null,
    score: 0,
    best: parseInt(localStorage.getItem('snake_neon_best')||'0',10),
    speed: 8,
    slowTimer: 0
  };
  bestEl.textContent = state.best;

  function resize(){
    const rect = canvas.getBoundingClientRect();
    size = Math.floor(rect.width);
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cell = size / GRID;
  }

  function resetGame(){
    state.snake = [];
    const startX = Math.floor(GRID/3);
    const startY = Math.floor(GRID/2);
    for(let i=0;i<4;i++){
      state.snake.push({x:startX - i, y:startY});
    }
    state.dir = {x:1, y:0};
    state.nextDir = {x:1, y:0};
    state.score = 0;
    state.speed = 8;
    state.slowTimer = 0;
    state.power = null;
    placeFood();
    updateScore();
    acc = 0;
    lastTime = performance.now();
  }

  function startGame(){
    resetGame();
    state.running = true;
    state.over = false;
    startOverlay.classList.add('hide');
    gameOverOverlay.classList.add('hide');
    powerBadge.classList.remove('show');
  }

  function gameOver(){
    state.running = false;
    state.over = true;
    if(state.score > state.best){
      state.best = state.score;
      localStorage.setItem('snake_neon_best', state.best);
      bestEl.textContent = state.best;
    }
    finalScoreEl.textContent = state.score;
    finalBestEl.textContent = state.best;
    gameOverOverlay.classList.remove('hide');
  }

  function updateScore(){
    scoreEl.textContent = state.score;
  }

  function placeFood(){
    let x,y,ok;
    do{
      ok = true;
      x = Math.floor(Math.random()*GRID);
      y = Math.floor(Math.random()*GRID);
      for(const s of state.snake){
        if(s.x===x && s.y===y){ ok=false; break; }
      }
      if(state.power && state.power.x===x && state.power.y===y) ok=false;
    }while(!ok);
    state.food = {x,y};
  }

  function maybeSpawnPower(){
    if(state.power) return;
    if(Math.random() < 0.25){
      let x,y,ok,attempts=0;
      do{
        ok = true;
        x = Math.floor(Math.random()*GRID);
        y = Math.floor(Math.random()*GRID);
        attempts++;
        if(attempts>200) return;
        for(const s of state.snake){
          if(s.x===x && s.y===y){ ok=false; break; }
        }
        if(state.food.x===x && state.food.y===y) ok=false;
      }while(!ok);
      state.power = {x,y, life: 8000};
    }
  }

  function setDir(nx,ny){
    if(nx === -state.dir.x && ny === -state.dir.y) return;
    if(nx === state.dir.x && ny === state.dir.y) return;
    state.nextDir = {x:nx, y:ny};
  }

  function turnLeft(){
    const dx = state.dir.x, dy = state.dir.y;
    setDir(dy, -dx);
  }

  function turnRight(){
    const dx = state.dir.x, dy = state.dir.y;
    setDir(-dy, dx);
  }

  function step(){
    state.dir = state.nextDir;

    const head = state.snake[0];
    const nx = head.x + state.dir.x;
    const ny = head.y + state.dir.y;

    if(nx < 0 || ny < 0 || nx >= GRID || ny >= GRID){
      gameOver();
      return;
    }
    for(const s of state.snake){
      if(s.x===nx && s.y===ny){
        gameOver();
        return;
      }
    }

    state.snake.unshift({x:nx, y:ny});

    let ate = false;
    if(state.food && nx===state.food.x && ny===state.food.y){
      ate = true;
      state.score += 10;
      updateScore();
      placeFood();
      maybeSpawnPower();
    }

    if(state.power && nx===state.power.x && ny===state.power.y){
      state.slowTimer = 5000;
      powerBadge.classList.add('show');
      state.power = null;
      state.score += 25;
      updateScore();
    }

    if(!ate){
      state.snake.pop();
    }
  }
  function update(dt){
    if(!state.running) return;

    if(state.slowTimer > 0){
      state.slowTimer -= dt;
      if(state.slowTimer <= 0){
        state.slowTimer = 0;
        powerBadge.classList.remove('show');
      }
      powerBadge.textContent = `SLOW • ${(state.slowTimer/1000).toFixed(1)}s`;
    }

    if(state.power){
      state.power.life -= dt;
      if(state.power.life <= 0) state.power = null;
    }

    const movesPerSec = state.slowTimer > 0? 4 : 8;
    acc += dt/1000 * movesPerSec;
    while(acc >= 1){
      step();
      acc -= 1;
      if(!state.running) break;
    }
  }

  function drawRoundedRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function render(time){
    ctx.clearRect(0,0,size,size);

    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 1;
    for(let i=1;i<GRID;i++){
      const p = i*cell;
      ctx.beginPath();
      ctx.moveTo(p,0);
      ctx.lineTo(p,size);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0,p);
      ctx.lineTo(size,p);
      ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 20;
    ctx.strokeRect(2,2,size-4,size-4);
    ctx.restore();

    if(state.food){
      const cx = (state.food.x + 0.5)*cell;
      const cy = (state.food.y + 0.5)*cell;
      const pulse = 0.35 + 0.07*Math.sin(time*0.01);
      const r = cell*pulse;
      ctx.save();
      ctx.shadowColor = '#ff00ff';
      ctx.shadowBlur = 25;
      ctx.fillStyle = '#ff00ff';
      ctx.beginPath();
      ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(cx - r*0.3, cy - r*0.3, r*0.25,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    if(state.power){
      const cx = (state.power.x + 0.5)*cell;
      const cy = (state.power.y + 0.5)*cell;
      const pulse = 0.38 + 0.05*Math.sin(time*0.012);
      const r = cell*pulse;
      ctx.save();
      ctx.shadowColor = '#0088ff';
      ctx.shadowBlur = 30;
      ctx.fillStyle = '#0088ff';
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r, cy);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    for(let i=state.snake.length-1; i>=0; i--){
      const s = state.snake[i];
      const x = s.x*cell + CELL_BORDER;
      const y = s.y*cell + CELL_BORDER;
      const w = cell - CELL_BORDER*2;
      const h = cell - CELL_BORDER*2;
      const isHead = i===0;

      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = isHead? 25 : 15;
      ctx.fillStyle = isHead? '#aaffff' : '#00eaff';
      drawRoundedRect(x+1, y+1, w-2, h-2, 6);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#ffffff';
      drawRoundedRect(x+3, y+3, w-6, h-6, 4);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    const h = state.snake[0];
    if(h){
      const cx = (h.x + 0.5)*cell;
      const cy = (h.y + 0.5)*cell;
      const eyeDist = cell*0.18;
      const dx = state.dir.x, dy = state.dir.y;
      const px = -dy, py = dx;
      ctx.fillStyle = '#001016';
      ctx.beginPath();
      ctx.arc(cx + dx*cell*0.1 + px*eyeDist, cy + dy*cell*0.1 + py*eyeDist, cell*0.07,0,Math.PI*2);
      ctx.arc(cx + dx*cell*0.1 - px*eyeDist, cy + dy*cell*0.1 - py*eyeDist, cell*0.07,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function loop(t){
    const dt = Math.min(50, t - lastTime);
    lastTime = t;
    update(dt);
    render(t);
    requestAnimationFrame(loop);
  }

  let touchStart = null;
  canvas.addEventListener('touchstart', e=>{
    if(!state.running) return;
    const t = e.changedTouches[0];
    touchStart = {x:t.clientX, y:t.clientY, time:performance.now()};
  }, {passive:true});

  canvas.addEventListener('touchend', e=>{
    if(!touchStart ||!state.running) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const dist = Math.hypot(dx,dy);
    if(dist < 24) { touchStart=null; return; }
    if(Math.abs(dx) > Math.abs(dy)){
      setDir(dx>0?1:-1,0);
    }else{
      setDir(0,dy>0?1:-1);
    }
    touchStart = null;
  }, {passive:true});

  let mouseDown = false, mdStart=null;
  canvas.addEventListener('mousedown', e=>{
    mouseDown = true;
    mdStart = {x:e.clientX, y:e.clientY};
  });
  window.addEventListener('mouseup', e=>{
    if(!mouseDown ||!mdStart ||!state.running) return;
    const dx = e.clientX - mdStart.x;
    const dy = e.clientY - mdStart.y;
    if(Math.hypot(dx,dy) > 24){
      if(Math.abs(dx) > Math.abs(dy)) setDir(dx>0?1:-1,0);
      else setDir(0,dy>0?1:-1);
    }
    mouseDown = false;
    mdStart = null;
  });

  leftBtn.addEventListener('click', ()=>{ if(state.running) turnLeft(); });
  rightBtn.addEventListener('click', ()=>{ if(state.running) turnRight(); });

  window.addEventListener('keydown', e=>{
    if(!state.running && e.code==='Space'){
      startGame();
      return;
    }
    switch(e.key){
      case 'ArrowUp': setDir(0,-1); break;
      case 'ArrowDown': setDir(0,1); break;
      case 'ArrowLeft': setDir(-1,0); break;
      case 'ArrowRight': setDir(1,0); break;
      case 'a': case 'A': turnLeft(); break;
      case 'd': case 'D': turnRight(); break;
    }
  });

  playBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  resize();
  window.addEventListener('resize', ()=>{
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    resize();
  });
  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
